name: Terraform CI/CD

on:
  pull_request:
    branches: [staging, main]
  push:
    branches: [staging, main]

env:
  TF_VERSION: '1.6.0'
  AWS_REGION: 'us-east-1'

jobs:
  staging:
    name: Staging
    if: github.ref == 'refs/heads/staging' || github.base_ref == 'staging'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./environments

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        id: plan
        run: terraform plan -var-file="staging.tfvars" -no-color
        continue-on-error: true

      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Staging Plan

              \`\`\`
              ${{ steps.plan.outputs.stdout }}
              \`\`\`

              Merge to deploy to staging.`
            })

      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
        run: terraform apply -var-file="staging.tfvars" -auto-approve

      - name: Get Outputs
        if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
        id: outputs
        run: |
          echo "bucket=$(terraform output -raw bucket_name)" >> $GITHUB_OUTPUT
          echo "lambda=$(terraform output -raw lambda_function_name)" >> $GITHUB_OUTPUT

      - name: Summary
        if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
        run: |
          echo "## Staging Deployed ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Bucket: \`${{ steps.outputs.outputs.bucket }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Lambda: \`${{ steps.outputs.outputs.lambda }}\`" >> $GITHUB_STEP_SUMMARY

  production:
    name: Production
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./environments

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        id: plan
        run: terraform plan -var-file="production.tfvars" -no-color
        continue-on-error: true

      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Production Plan ⚠️

              \`\`\`
              ${{ steps.plan.outputs.stdout }}
              \`\`\`

              **WARNING:** Merge to deploy to PRODUCTION.`
            })

      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -var-file="production.tfvars" -auto-approve

      - name: Get Outputs
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: outputs
        run: |
          echo "bucket=$(terraform output -raw bucket_name)" >> $GITHUB_OUTPUT
          echo "lambda=$(terraform output -raw lambda_function_name)" >> $GITHUB_OUTPUT

      - name: Summary
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "## Production Deployed 🚀" >> $GITHUB_STEP_SUMMARY
          echo "- Bucket: \`${{ steps.outputs.outputs.bucket }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Lambda: \`${{ steps.outputs.outputs.lambda }}\`" >> $GITHUB_STEP_SUMMARY
